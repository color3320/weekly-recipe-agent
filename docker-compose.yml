services:
  mongodb:
    image: mongodb/mongodb-atlas-local:preview
    container_name: weekly-recipes-mongodb
    environment:
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: hackathon-postgres
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: hotel_hackathon
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  mongodata:
